<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Next Step helps choose one small next action when executive dysfunction gets in the way."
    />
    <meta name="theme-color" content="#276f64" />
    <link rel="manifest" href="./assets/manifest-BSLezwWV.webmanifest" />
    <link rel="icon" href="./assets/icon-DsPUBfWi.svg" type="image/svg+xml" />
    <title>Next Step</title>
    <script type="module" crossorigin src="./assets/index-B_bAaFni.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DYBGuBj3.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (
        location.hostname.endsWith("github.io") &&
        document.querySelector('script[src="/src/main.tsx"]')
      ) {
        const repo = location.pathname.split("/").filter(Boolean)[0];
        const rootPath = repo ? `/${repo}/` : "/";
        const target = new URL(`${rootPath}docs/`, location.origin).toString();
        const redirect = () => location.replace(target);

        if ("serviceWorker" in navigator) {
          navigator.serviceWorker
            .getRegistrations()
            .then((registrations) =>
              Promise.all(
                registrations
                  .filter((registration) => new URL(registration.scope).pathname === rootPath)
                  .map((registration) => registration.unregister())
              )
            )
            .finally(redirect);
        } else {
          redirect();
        }
      }
    </script>
  </body>
</html>
